log_water_test:
  fields:
    pool_id:
      example: pool
      selector:
        text:
    event_timestamp:
      example: "2026-06-15T16:30:00-05:00"
      selector:
        datetime:
    source:
      default: service
      example: agent
      selector:
        text:
    free_chlorine:
      example: 3.2
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    total_chlorine:
      example: 3.4
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    combined_chlorine:
      example: 0.2
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    total_bromine:
      example: 4.0
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    ph:
      example: 7.2
      selector:
        number:
          min: 0
          max: 14
          mode: box
    total_alkalinity:
      example: 80
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    calcium_hardness:
      example: 250
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    total_hardness:
      example: 275
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    cya:
      example: 40
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    salt:
      example: 3200
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    total_dissolved_solids:
      example: 1500
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    phosphates:
      example: 0.1
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    copper:
      example: 0.1
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    iron:
      example: 0.1
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: ppm
    water_temperature:
      example: 82
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: F
    water_clarity:
      example: clear
      selector:
        select:
          options:
            - value: clear
              label: Clear
            - value: hazy
              label: Hazy
            - value: cloudy
              label: Cloudy
            - value: green
              label: Green
            - value: other
              label: Other
    testing_method:
      example: strips
      selector:
        select:
          options:
            - value: strips
              label: Test strips
            - value: drop_test
              label: Drop test
            - value: digital_meter
              label: Digital meter
            - value: photometer
              label: Photometer
            - value: pool_store
              label: Pool store
            - value: other
              label: Other
    notes:
      example: Taylor drop test after evening swim.
      selector:
        text:
          multiline: true

log_chemical_addition:
  fields:
    pool_id:
      example: pool
      selector:
        text:
    event_timestamp:
      example: "2026-06-15T16:30:00-05:00"
      selector:
        datetime:
    source:
      default: service
      example: agent
      selector:
        text:
    chemical:
      required: true
      example: dichlor
      selector:
        select:
          options:
            - value: dichlor
              label: Dichlor
            - value: trichlor
              label: Trichlor
            - value: calcium hypochlorite
              label: Calcium hypochlorite
            - value: liquid chlorine
              label: Liquid chlorine
            - value: bleach
              label: Bleach
            - value: muriatic acid
              label: Muriatic acid
            - value: soda ash
              label: Soda ash
            - value: baking soda
              label: Baking soda
            - value: cyanuric acid
              label: Cyanuric acid
            - value: salt
              label: Salt
            - value: algaecide
              label: Algaecide
            - value: clarifier
              label: Clarifier
            - value: calcium hardness increaser
              label: Calcium hardness increaser
    amount:
      required: true
      example: 0.5
      selector:
        number:
          min: 0
          mode: box
          step: any
    unit:
      required: true
      example: oz
      selector:
        select:
          options:
            - value: g
              label: Grams
            - value: kg
              label: Kilograms
            - value: oz
              label: Ounces
            - value: lb
              label: Pounds
            - value: mL
              label: Milliliters
            - value: L
              label: Liters
            - value: Tbsp
              label: Tablespoons
            - value: fl. oz.
              label: Fluid ounces
            - value: gal
              label: Gallons
    notes:
      example: Human-entered record only.
      selector:
        text:
          multiline: true

get_prediction:
  target:
    entity:
      integration: pool_tracker
      domain: sensor
